const COLORS = {"COTOPAXI": "#2563EB", "TUNGURAHUA": "#16A34A", "CHIMBORAZO": "#DC2626", "PASTAZA": "#9333EA"};

const map = L.map('map', { preferCanvas: true }).setView([-1.55, -78.5], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap', maxZoom: 19
}).addTo(map);

const provGroups = {};
const provCount = {};
Object.keys(COLORS).forEach(p => {
  provGroups[p] = L.markerClusterGroup({
    chunkedLoading: true, maxClusterRadius: 45,
    iconCreateFunction: function(cluster) {
      const n = cluster.getChildCount();
      return L.divIcon({
        html: `<div style="background:${COLORS[p]};color:white;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.4);">${n}</div>`,
        className: '', iconSize: L.point(34,34)
      });
    }
  });
  provCount[p] = 0;
});

function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

const allMarkers = [];
SCHOOLS.forEach(s => {
  if (s.lat == null || s.lon == null) return;
  const color = COLORS[s.prov] || '#666';
  const m = L.circleMarker([s.lat, s.lon], {
    radius: 5, color: '#fff', weight: 1.2, fillColor: color, fillOpacity: 0.9
  });
  const popup = `
    <div class="popup-name">${escapeHtml(s.name)}</div>
    <div class="popup-row"><b>AMIE:</b> ${escapeHtml(s.amie)}</div>
    <div class="popup-row"><b>Provincia:</b> ${escapeHtml(s.prov)} — ${escapeHtml(s.canton)}</div>
    <div class="popup-row"><b>Parroquia:</b> ${escapeHtml(s.parr)}</div>
    <div class="popup-row"><b>Dirección:</b> ${escapeHtml(s.dir)}</div>
    <div class="popup-row"><b>Coords:</b> ${s.lat.toFixed(5)}, ${s.lon.toFixed(5)}</div>
    <div class="popup-row"><b>UTM:</b> ${s.x}, ${s.y}</div>
    <div class="popup-row"><b>Alumnos:</b> ${s.tot} | <b>Acceso:</b> ${escapeHtml(s.acc)}</div>
    <div class="popup-row"><a href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lon}" target="_blank">Abrir en Google Maps</a></div>
  `;
  m.bindPopup(popup, {maxWidth: 320});
  m.schoolData = s;
  provGroups[s.prov].addLayer(m);
  provCount[s.prov]++;
  allMarkers.push(m);
});

Object.keys(provGroups).forEach(p => map.addLayer(provGroups[p]));

// Legend with toggles
const legend = document.getElementById('legend');
Object.keys(COLORS).forEach(p => {
  const lab = document.createElement('label');
  lab.innerHTML = `<input type="checkbox" data-prov="${p}" checked><span class="swatch" style="background:${COLORS[p]}"></span> ${p} <span style="margin-left:auto;color:#666;font-size:11px">${provCount[p]||0}</span>`;
  lab.style.justifyContent = 'space-between';
  legend.appendChild(lab);
});
legend.addEventListener('change', e => {
  if (e.target.matches('input[type=checkbox]')) {
    const p = e.target.dataset.prov;
    if (e.target.checked) map.addLayer(provGroups[p]);
    else map.removeLayer(provGroups[p]);
  }
});

// Stats
const total = SCHOOLS.length;
document.getElementById('stats').innerHTML = `<span>${total}</span> escuelas mapeadas en 4 provincias.`;

// Search
const q = document.getElementById('q');
let lastResult = null;
q.addEventListener('input', () => {
  const term = q.value.trim().toLowerCase();
  if (!term) return;
  const hit = allMarkers.find(m => {
    const d = m.schoolData;
    return (d.amie||'').toLowerCase().includes(term) ||
           (d.name||'').toLowerCase().includes(term);
  });
  if (hit) {
    map.setView(hit.getLatLng(), 14);
    hit.openPopup();
    lastResult = hit;
  }
});

// Fit bounds initial
const ecuadorBounds = L.latLngBounds([[-2.7,-79.4],[ -0.4, -76.5]]);
map.fitBounds(ecuadorBounds);
</script>
